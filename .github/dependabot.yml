# Dependabot 依赖版本更新配置
# 文档：https://docs.github.com/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # 前端（client）npm 依赖
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
    # 将前端的只读小版本(minor)与修订版(patch)打包到一个 PR，避免满屏 PR 的困扰
    groups:
      client-minor-patch-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # 忽略主要版本升级（重大升级由主人来指定时间手动处理）
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # 后端（server）npm 依赖
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps)"
    # 后端同样开启打包合并更新策略
    groups:
      server-minor-patch-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions-updates:
        patterns:
          - "*"
