name = "monolith-server"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[vars]
# 非敏感配置变量（敏感的用 wrangler secret put）
BLOG_NAME = "Monolith"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "monolith-db"
database_id = "7077071b-3fc5-4e35-85b0-e5043cfc6fc0"
migrations_dir = "src/migrations"

# R2 存储桶绑定
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "monolith-assets"

# 定时触发器 (每 1 分钟执行一次)
[triggers]
crons = ["* * * * *"]
